<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1f9d55">
<title>Amimì — Stato sistema</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #f2efea;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 20px 16px 60px; }
  .card {
    border-radius: 20px; padding: 40px 24px; text-align: center; color: #fff;
    box-shadow: 0 6px 20px rgba(0,0,0,.12); transition: background .3s;
  }
  .emoji { font-size: 54px; line-height: 1; font-weight: 700; }
  .title { font-size: 26px; font-weight: 800; letter-spacing: .5px; margin-top: 14px; }
  ul { list-style: none; padding: 0; margin: 24px 0 0; }
  li {
    display: flex; gap: 12px; align-items: flex-start; background: #fff;
    border-radius: 14px; padding: 16px 18px; margin-bottom: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  .dot { flex: none; width: 10px; height: 10px; border-radius: 50%; margin-top: 7px; }
  .itext { font-size: 16px; line-height: 1.45; color: #2d2226; }
  .allgood { text-align: center; color: #5b6b5f; font-size: 16px; margin-top: 24px; }
  .foot { text-align: center; color: #9a948c; font-size: 13px; margin-top: 32px; }
</style>
</head>
<body>
<div class="wrap">
  <div id="card" class="card" style="background:#9a948c">
    <div class="emoji">…</div>
    <div class="title">CONTROLLO IN CORSO</div>
  </div>
  <div id="list"></div>
  <p class="foot" id="foot">Caricamento…</p>
  <div style="text-align:center;margin-top:6px">
    <button id="notifBtn" style="display:none;background:#fff;border:1px solid #d8d2c8;
      border-radius:12px;padding:11px 18px;font-size:15px;color:#2d2226;cursor:pointer;
      box-shadow:0 1px 3px rgba(0,0,0,.06)">🔔 Attiva notifiche</button>
  </div>
</div>

<script>
  // Legge SOLO un file dello stesso sito (status.json), aggiornato dal robot
  // GitHub Actions. Nessuna chiamata a Google dal browser: niente lock Drive,
  // funziona su qualsiasi telefono, loggato o no.
  function fmtTime(iso) {
    try {
      var d = new Date(iso);
      return d.toLocaleDateString("it-IT", { day: "2-digit", month: "short" }) + " " +
             d.toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" });
    } catch (e) { return ""; }
  }
  function escapeHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function render(data) {
    var hasProblem = (data.issues || []).some(function (i) { return i.level === "problema"; });
    var ok = data.state === "OK";
    var color = ok ? "#1f9d55" : (hasProblem ? "#c1121f" : "#d98a00");
    var title = ok ? "TUTTO OK" : (hasProblem ? "CI SONO PROBLEMI" : "DA TENERE D'OCCHIO");
    var emoji = ok ? "✓" : (hasProblem ? "!" : "~");

    var card = document.getElementById("card");
    card.style.background = color;
    card.innerHTML = '<div class="emoji">' + emoji + '</div><div class="title">' + title + '</div>';
    document.querySelector('meta[name=theme-color]').setAttribute("content", color);

    var list = document.getElementById("list");
    if (data.issues && data.issues.length) {
      var html = "<ul>";
      data.issues.forEach(function (i) {
        var dot = i.level === "problema" ? "#c1121f" : "#d98a00";
        html += '<li><span class="dot" style="background:' + dot + '"></span>' +
                '<span class="itext">' + escapeHtml(i.text) + "</span></li>";
      });
      list.innerHTML = html + "</ul>";
    } else {
      list.innerHTML = '<p class="allgood">Tutti i processi automatici girano regolarmente. Niente da fare.</p>';
    }
    document.getElementById("foot").textContent =
      "Ultimo controllo: " + fmtTime(data.checkedAt) + " · si aggiorna da solo";
  }

  function showError() {
    var card = document.getElementById("card");
    card.style.background = "#6b6b6b";
    card.innerHTML = '<div class="emoji">?</div><div class="title">NON RAGGIUNGIBILE</div>';
    document.getElementById("foot").textContent =
      "Non riesco a leggere lo stato. Riprovo tra poco.";
  }

  // Sorgente primaria: raw.githubusercontent (CORS aperto, infrastruttura diversa
  // da Pages che ignora la query e cachea 10 min un eventuale 404 vecchio).
  // Fallback: status.json servito da Pages (stesso sito).
  var RAW = "https://raw.githubusercontent.com/NoobHandbag/amimi-status/master/status.json";

  function getJson(url) {
    return fetch(url + "?_=" + Date.now(), { cache: "no-store" })
      .then(function (r) { if (!r.ok) throw new Error("http " + r.status); return r.json(); });
  }

  function load() {
    getJson(RAW)
      .then(render)
      .catch(function () { getJson("./status.json").then(render).catch(showError); });
  }

  load();
  setInterval(load, 120000);            // ricarica ogni 2 minuti
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) load();        // ricarica quando riapri l'app
  });

  // ── notifiche push del browser ──────────────────────────────────────────
  var VAPID_PUBLIC = "BDBnJUHqlGhLJ9IMXQ5Dabu0qFYlvvVpkFK7cftpDj-gAjKFD1Corm9fJyIIzQXixj2Nlj1wpCKwUrUfE-uORD0";
  var COLLECTOR = "https://script.google.com/macros/s/AKfycbz6jZbLpyxrodOtQ9PBlJEOGylTIsol-h6z7IkeguT_JMnBLLBukD5L0UrZDHzjSsPCPg/exec";
  var btn = document.getElementById("notifBtn");

  function setBtn(text, disabled) {
    btn.textContent = text;
    btn.disabled = !!disabled;
  }

  function urlBase64ToUint8Array(b64) {
    var pad = "=".repeat((4 - b64.length % 4) % 4);
    var s = (b64 + pad).replace(/-/g, "+").replace(/_/g, "/");
    var raw = atob(s), arr = new Uint8Array(raw.length);
    for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
    return arr;
  }

  var pushSupported = ("serviceWorker" in navigator) && ("PushManager" in window);
  if (pushSupported) {
    btn.style.display = "inline-block";
    if (localStorage.getItem("amimi_push") === "1") setBtn("🔔 Notifiche attive");
    btn.addEventListener("click", enableNotifications);
  }

  function enableNotifications() {
    setBtn("Attivazione…", true);
    navigator.serviceWorker.register("sw.js")
      .then(function (reg) {
        return Notification.requestPermission().then(function (perm) {
          if (perm !== "granted") throw new Error("permesso negato");
          return reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC)
          });
        });
      })
      .then(function (sub) {
        // invio ANONIMO (credentials:omit = niente cookie Google -> niente lock)
        return fetch(COLLECTOR, {
          method: "POST",
          mode: "no-cors",
          credentials: "omit",
          headers: { "Content-Type": "text/plain;charset=UTF-8" },
          body: JSON.stringify({ action: "subscribe", subscription: sub })
        });
      })
      .then(function () {
        localStorage.setItem("amimi_push", "1");
        setBtn("🔔 Notifiche attive");
      })
      .catch(function (e) {
        setBtn("🔔 Attiva notifiche");
        alert("Non sono riuscito ad attivare le notifiche: " + e.message);
      });
  }
</script>
</body>
</html>
